name: Accolta CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: accolta-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Quality, Tests & Assets
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      APP_NAME: Accolta
      APP_ENV: testing
      APP_DEBUG: false
      LOG_CHANNEL: stderr

      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'

      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      CACHE_STORE: array

      BCRYPT_ROUNDS: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3, curl, intl, zip
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --strict --no-check-publish

      - name: Install PHP dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Check PHP formatting
        run: composer format:check

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test

      - name: Build frontend assets
        run: npm run build